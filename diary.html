<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>정인혁의 업무일지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --paper:#FBF2E1;        /* 다이어리 속지 */
  --paper-deep:#F5E6C8;   /* 짙은 속지 */
  --card:#FFF9EC;
  --ink:#4A3423;          /* 갈색 잉크 */
  --ink-soft:#8A705A;
  --accent:#E5762E;       /* 주황 괘선/제목 */
  --accent-deep:#C95F1D;
  --rule:#F0C9A0;         /* 옅은 괘선 */
  --blue:#3A57C8;         /* 볼펜 파랑(카테고리) */
  --done:#B7A288;
  --green:#4C9A62;
  --amber:#D69A2B;
  --gray:#A79680;
  --danger:#C85A4A;
  --shadow:0 10px 30px rgba(120,80,40,.14);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;
  background:
    radial-gradient(1200px 600px at 80% -10%, #FDE8C8 0%, transparent 60%),
    linear-gradient(#F6E9CF,#F1DFC0);
  color:var(--ink);
  min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom);
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:var(--ink)}
input:focus,textarea:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
input:focus,textarea:focus{outline-offset:0}
::placeholder{color:#C7B49B}
.hidden{display:none!important}

/* ───────── 로그인 ───────── */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--card);border:1.5px solid var(--rule);border-radius:20px;box-shadow:var(--shadow);
  padding:40px 32px;width:100%;max-width:380px;text-align:center}
.login-card h1{font-family:'Jua';font-size:1.9rem;color:var(--accent);font-weight:400;letter-spacing:.5px}
.login-card .sub{font-family:'Nanum Pen Script';font-size:1.35rem;color:var(--ink-soft);margin:4px 0 26px}
.login-card input{width:100%;padding:13px 14px;margin-bottom:10px;border:1.5px solid var(--rule);
  border-radius:10px;background:#FFFDF6;font-size:1rem}
.btn-primary{display:block;width:100%;padding:13px;border-radius:10px;background:var(--accent);color:#fff;
  font-weight:700;font-size:1.02rem;transition:.15s}
.btn-primary:hover{background:var(--accent-deep)}
.login-msg{font-size:.85rem;color:var(--danger);min-height:1.2em;margin-top:10px}

/* ───────── 상단바 ───────── */
#topbar{position:sticky;top:0;z-index:50;background:rgba(251,242,225,.92);backdrop-filter:blur(8px);
  border-bottom:1.5px solid var(--rule);padding:10px 16px calc(10px);}
.topbar-in{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.brand{font-family:'Jua';font-size:1.25rem;color:var(--accent);font-weight:400;white-space:nowrap}
.tabs{display:flex;gap:4px;background:var(--paper-deep);border-radius:999px;padding:3px;margin-left:auto}
.tab{padding:7px 16px;border-radius:999px;font-weight:600;font-size:.9rem;color:var(--ink-soft)}
.tab.on{background:#fff;color:var(--accent-deep);box-shadow:0 2px 6px rgba(120,80,40,.15)}
.icon-btn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:1.15rem;background:var(--paper-deep);transition:.15s}
.icon-btn:hover{background:#EFDCB8}

/* ───────── 날짜 내비 ───────── */
#dateNav{max-width:900px;margin:18px auto 0;padding:0 16px;display:flex;align-items:center;justify-content:center;gap:8px}
.date-arrow{width:40px;height:40px;border-radius:50%;background:var(--card);border:1.5px solid var(--rule);
  font-size:1.05rem;color:var(--accent-deep);display:flex;align-items:center;justify-content:center}
.date-chip{position:relative;background:var(--card);border:1.5px solid var(--rule);border-radius:14px;
  padding:8px 20px;text-align:center;cursor:pointer;min-width:210px}
.date-chip .dow{font-family:'Nanum Pen Script';font-size:1.15rem;color:var(--accent);line-height:1}
.date-chip .ymd{font-weight:800;font-size:1.12rem;letter-spacing:.3px}
.date-chip input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.today-btn{font-size:.82rem;font-weight:700;color:var(--accent-deep);background:var(--card);
  border:1.5px solid var(--rule);border-radius:999px;padding:8px 13px}
#saveState{max-width:900px;margin:6px auto 0;padding:0 20px;font-size:.75rem;color:var(--ink-soft);
  text-align:right;height:1em}

/* ───────── 다이어리 시트 ───────── */
#sheet{max-width:900px;margin:12px auto 60px;padding:0 12px}
.paper{background:var(--paper);border:1.5px solid #EBC9A0;border-radius:var(--radius);box-shadow:var(--shadow);
  padding:26px 22px 30px;position:relative;overflow:hidden}
.paper::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;
  background:repeating-linear-gradient(180deg,var(--accent) 0 14px,transparent 14px 26px);opacity:.35}
.sheet-head{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;border-bottom:2.5px solid var(--accent);
  padding-bottom:10px;margin-bottom:6px}
.sheet-title{font-family:'Jua';font-size:1.7rem;color:var(--accent);font-weight:400}
.note-wrap{flex:1;min-width:220px;display:flex;align-items:baseline;gap:8px}
.note-label{font-family:'Jua';color:var(--accent);font-size:1.02rem;white-space:nowrap}
#dayNote{flex:1;border:none;background:transparent;border-bottom:1.5px dashed var(--rule);
  font-family:'Nanum Pen Script';font-size:1.3rem;color:var(--blue);padding:2px 4px}

.section-star{font-family:'Jua';color:var(--accent-deep);font-size:1.12rem;margin:20px 0 10px;
  display:flex;align-items:center;gap:8px}
.section-star .actions{margin-left:auto;display:flex;gap:6px}
.mini-btn{font-size:.8rem;font-weight:700;padding:6px 11px;border-radius:999px;background:#fff;
  border:1.5px solid var(--rule);color:var(--accent-deep);transition:.15s}
.mini-btn:hover{background:#FFF3DF}

/* 카테고리 */
.cat{margin-bottom:6px;border-radius:10px;transition:background .2s}
.cat-head{display:flex;align-items:center;gap:8px;padding:8px 4px 6px;border-bottom:1.5px solid var(--rule)}
.cat-dot{width:9px;height:9px;border-radius:50%;background:var(--blue);flex:none}
.cat-name{flex:1;min-width:0;border:none;background:transparent;font-family:'Jua';font-size:1.13rem;
  color:var(--blue);font-weight:400;padding:2px}
.ctl{display:flex;gap:2px;opacity:.55;transition:.15s}
.cat:hover .ctl,.task:hover .ctl{opacity:1}
.ctl button{width:28px;height:28px;border-radius:8px;font-size:.85rem;color:var(--ink-soft);
  display:flex;align-items:center;justify-content:center}
.ctl button:hover{background:var(--paper-deep);color:var(--accent-deep)}
.ctl .del:hover{color:var(--danger)}

/* 업무 행 */
.task{display:flex;align-items:center;gap:8px;padding:9px 4px;border-bottom:1px solid var(--rule);flex-wrap:wrap}
.chk{width:21px;height:21px;flex:none;border:2px solid var(--accent);border-radius:6px;background:#FFFDF6;
  display:flex;align-items:center;justify-content:center;font-size:.85rem;color:#fff;transition:.15s}
.chk.on{background:var(--accent);border-color:var(--accent)}
.task-text{flex:1;min-width:150px;border:none;background:transparent;font-size:.98rem;padding:3px 2px;color:var(--ink)}
.task.done .task-text{text-decoration:line-through;color:var(--done)}
.task-meta{display:flex;align-items:center;gap:6px;flex:none}
.status-chip{font-size:.74rem;font-weight:800;padding:5px 10px;border-radius:999px;border:1.5px solid;min-width:56px;text-align:center}
.st-wait{color:var(--gray);border-color:#D8CBB6;background:#FBF6EA}
.st-doing{color:var(--blue);border-color:#B9C4EE;background:#EEF1FC}
.st-hold{color:var(--amber);border-color:#EBD3A0;background:#FBF2DC}
.st-done{color:var(--green);border-color:#B4D6BE;background:#EAF6EE}
.due-in{width:96px;border:1.5px solid var(--rule);border-radius:8px;background:#FFFDF6;
  font-size:.78rem;padding:5px 6px;color:var(--ink-soft)}
.clip-btn{position:relative;width:30px;height:30px;border-radius:8px;font-size:1rem;color:var(--ink-soft);
  display:flex;align-items:center;justify-content:center}
.clip-btn:hover{background:var(--paper-deep)}
.clip-btn .cnt{position:absolute;top:-4px;right:-4px;background:var(--accent);color:#fff;font-size:.62rem;
  font-weight:800;border-radius:999px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* 첨부 패널(업무별 · 숨김형) */
.attach-panel{width:100%;background:#FFF7E6;border:1.5px dashed var(--rule);border-radius:10px;
  padding:12px;margin:4px 0 6px 29px}
.attach-panel .ap-head{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.ap-title{font-size:.8rem;font-weight:800;color:var(--accent-deep)}
.file-grid{display:flex;flex-wrap:wrap;gap:10px}
.thumb{position:relative;width:86px;height:86px;border-radius:10px;overflow:hidden;border:1.5px solid var(--rule);
  background:#fff;cursor:pointer}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.file-x{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(60,40,20,.65);
  color:#fff;font-size:.7rem;display:flex;align-items:center;justify-content:center}
.audio-row{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--rule);
  border-radius:10px;padding:7px 10px;width:100%;max-width:420px}
.audio-row audio{flex:1;height:34px;min-width:0}
.audio-name{font-size:.72rem;color:var(--ink-soft);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-btn.recording{color:#fff;background:var(--danger);animation:pulse 1.2s infinite}
@keyframes pulse{50%{opacity:.65}}

/* 메모 */
#memoBox{background:#FFFBEF;border:1.5px solid var(--accent);border-radius:12px;padding:14px;min-height:120px}
#memoText{width:100%;border:none;background:
  repeating-linear-gradient(transparent,transparent 31px,var(--rule) 31px,var(--rule) 32px);
  line-height:32px;font-family:'Nanum Pen Script';font-size:1.35rem;color:var(--ink);resize:vertical;min-height:128px}
#memoFiles{margin-top:12px}
#memoFiles .thumb{width:min(240px,44vw);height:auto;aspect-ratio:4/3}

/* ───────── 기록(아카이브) ───────── */
#archiveView{max-width:900px;margin:16px auto 60px;padding:0 12px}
.year-row{display:flex;gap:8px;align-items:center;justify-content:center;margin-bottom:14px}
.year-label{font-family:'Jua';font-size:1.5rem;color:var(--accent-deep);min-width:120px;text-align:center}
.month-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;margin-bottom:18px}
.month-cell{background:var(--card);border:1.5px solid var(--rule);border-radius:12px;padding:12px 6px;
  text-align:center;font-weight:700;color:var(--ink-soft);transition:.15s}
.month-cell.has{color:var(--accent-deep);border-color:#E8B27C}
.month-cell.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.month-cell .mc-cnt{display:block;font-size:.68rem;font-weight:600;margin-top:2px;opacity:.8}
.day-list{display:flex;flex-direction:column;gap:10px}
.day-card{background:var(--card);border:1.5px solid var(--rule);border-radius:14px;padding:14px 16px;
  cursor:pointer;transition:.15s;display:flex;gap:14px;align-items:center}
.day-card:hover{box-shadow:var(--shadow);border-color:#E8B27C}
.dc-date{text-align:center;flex:none;width:56px}
.dc-date .d{font-family:'Jua';font-size:1.5rem;color:var(--accent);line-height:1.1}
.dc-date .w{font-size:.75rem;color:var(--ink-soft);font-weight:700}
.dc-body{flex:1;min-width:0}
.dc-note{font-family:'Nanum Pen Script';font-size:1.15rem;color:var(--blue);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dc-sub{font-size:.8rem;color:var(--ink-soft);margin-top:2px}
.dc-ring{flex:none;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:800;color:var(--accent-deep)}
.empty-note{text-align:center;color:var(--ink-soft);padding:40px 0;font-size:.92rem}

/* ───────── 내보내기/라이트박스/토스트 ───────── */
#lightbox{position:fixed;inset:0;background:rgba(40,25,10,.85);z-index:200;display:flex;
  align-items:center;justify-content:center;padding:20px}
#lightbox img{max-width:96%;max-height:92%;border-radius:10px}
#toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:var(--ink);
  color:#FFF6E4;padding:11px 20px;border-radius:999px;font-size:.88rem;font-weight:600;opacity:0;
  transition:.25s;z-index:300;pointer-events:none;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#exportMenu{position:fixed;inset:0;background:rgba(40,25,10,.45);z-index:150;display:flex;align-items:flex-end;justify-content:center}
.export-card{background:var(--card);border-radius:20px 20px 0 0;padding:22px 20px calc(26px + env(safe-area-inset-bottom));
  width:100%;max-width:480px}
.export-card h3{font-family:'Jua';color:var(--accent-deep);font-weight:400;margin-bottom:14px;text-align:center}
.export-card .btn-primary{margin-bottom:10px}
.btn-line{display:block;width:100%;padding:13px;border-radius:10px;border:1.5px solid var(--rule);
  background:#fff;font-weight:700;color:var(--accent-deep)}
#exportStage{position:fixed;left:-3000px;top:0}

/* ───────── 백업 모달 ───────── */
#backupModal{position:fixed;inset:0;background:rgba(40,25,10,.5);z-index:160;display:flex;
  align-items:center;justify-content:center;padding:16px}
.bk-card{background:var(--card);border-radius:20px;padding:22px 20px;width:100%;max-width:460px;
  max-height:92vh;overflow-y:auto;box-shadow:var(--shadow)}
.bk-card h3{font-family:'Jua';color:var(--accent-deep);font-weight:400;text-align:center;font-size:1.25rem}
.bk-yearrow{display:flex;align-items:center;justify-content:center;gap:10px;margin:14px 0 10px}
.bk-yearrow .yl{font-family:'Jua';font-size:1.2rem;color:var(--accent-deep);min-width:90px;text-align:center}
.bk-months{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.bk-m{border:1.5px solid var(--rule);border-radius:10px;padding:9px 4px;text-align:center;font-weight:700;
  font-size:.86rem;color:#C7B49B;background:#FBF6EA;position:relative}
.bk-m.has{color:var(--ink-soft);background:#fff;cursor:pointer}
.bk-m.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.bk-m .c{display:block;font-size:.64rem;font-weight:600;opacity:.85}
.bk-row{display:flex;align-items:center;gap:8px;font-size:.88rem;font-weight:600;color:var(--ink);
  padding:7px 2px;flex-wrap:wrap}
.bk-row input[type=checkbox],.bk-row input[type=radio]{width:17px;height:17px;accent-color:var(--accent)}
.bk-row.warn{color:var(--danger)}
.bk-divider{border:none;border-top:1.5px dashed var(--rule);margin:10px 0}
#bkProgWrap{margin:12px 0}
#bkProgText{font-size:.8rem;color:var(--ink-soft);margin-bottom:5px;text-align:center;min-height:1.1em}
#bkBar{height:10px;background:#F0E2C6;border-radius:999px;overflow:hidden}
#bkBarIn{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#F0A050);transition:width .2s;border-radius:999px}
.bk-btns{display:flex;gap:8px;margin-top:12px}
.bk-btns .btn-primary{flex:2;margin:0}
.bk-btns .btn-line{flex:1}
button:disabled{opacity:.45;cursor:not-allowed}

/* ───────── v3: 플로팅·마감칩·퀵메모·기타함·검색 ───────── */
#fabCat{position:fixed;right:18px;bottom:calc(26px + env(safe-area-inset-bottom));width:56px;height:56px;
  border-radius:50%;background:var(--accent);color:#fff;font-size:1.7rem;z-index:60;
  box-shadow:0 6px 18px rgba(200,110,40,.45);transition:.15s;display:flex;align-items:center;justify-content:center}
#fabCat:hover{background:var(--accent-deep);transform:scale(1.06)}
.due-wrap{position:relative;flex:none}
.due-chip{min-width:52px;padding:5px 9px;border:1.5px solid var(--rule);border-radius:8px;background:#FFFDF6;
  font-size:.78rem;font-weight:700;color:var(--ink-soft)}
.due-chip.over{color:#fff;background:var(--danger);border-color:var(--danger)}
.due-wrap input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.note-btn{position:relative;width:30px;height:30px;border-radius:8px;font-size:1rem;color:var(--ink-soft);
  display:flex;align-items:center;justify-content:center}
.note-btn:hover{background:var(--paper-deep)}
.note-btn .dot{position:absolute;top:2px;right:2px;width:9px;height:9px;border-radius:50%;background:var(--accent)}
.qnote{width:100%;border:1.5px solid var(--rule);border-radius:8px;background:#fff;padding:9px 10px;
  font-size:.9rem;line-height:1.5;resize:vertical;min-height:64px;margin-bottom:10px}
.inbox-wrap{background:#F7EEDC;border:1.5px dashed #DDBB8A;border-radius:12px;padding:6px 10px 10px;margin-top:4px}
.inbox-hint{font-size:.76rem;color:var(--ink-soft);padding:4px 4px 8px}
.search-bar{margin:0 0 14px}
.search-bar input{width:100%;padding:12px 16px;border:1.5px solid var(--rule);border-radius:999px;
  background:var(--card);font-size:.95rem;box-shadow:var(--shadow)}
mark{background:#FFE08A;color:inherit;border-radius:3px;padding:0 2px}
.sr-line{font-size:.88rem;padding:3px 0;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-line .sr-cat{font-weight:800;margin-right:4px}
.sr-line .sr-kind{font-size:.7rem;color:var(--ink-soft);background:var(--paper-deep);border-radius:6px;padding:1px 6px;margin-right:6px}

/* A4 렌더용 (794×1123 @96dpi) */
.a4{width:794px;min-height:1123px;background:#FBF2E1;padding:56px 52px;color:#4A3423;
  font-family:"Pretendard Variable",Pretendard,sans-serif;position:relative}
.a4 .a4-head{display:flex;align-items:flex-end;gap:16px;border-bottom:3px solid #E5762E;padding-bottom:10px}
.a4 .a4-title{font-family:'Jua';font-size:30px;color:#E5762E}
.a4 .a4-note{flex:1;font-family:'Nanum Pen Script';font-size:22px;color:#3A57C8}
.a4 .a4-date{font-size:14px;font-weight:700;color:#8A705A}
.a4 .a4-star{font-family:'Jua';font-size:18px;color:#C95F1D;margin:22px 0 8px}
.a4 table{width:100%;border-collapse:collapse}
.a4 th{border-bottom:2px solid #E5762E;border-top:2px solid #E5762E;padding:8px 6px;color:#E5762E;
  font-family:'Jua';font-weight:400;font-size:15px}
.a4 td{border-bottom:1px solid #F0C9A0;padding:9px 6px;font-size:14.5px;vertical-align:middle}
.a4 .cat-row td{font-family:'Jua';color:#3A57C8;font-size:16px;padding-top:14px}
.a4 .box{display:inline-block;width:15px;height:15px;border:2px solid #E5762E;border-radius:4px;
  vertical-align:-3px;margin-right:8px;text-align:center;line-height:12px;font-size:11px;color:#fff}
.a4 .box.on{background:#E5762E}
.a4 .done-t{text-decoration:line-through;color:#B7A288}
.a4 .memo-a4{border:2px solid #E5762E;border-radius:10px;min-height:170px;padding:14px;

<body>

<!-- 로그인 -->

  <div class="login-card">
    <h1>정인혁의 업무일지</h1>
    <div class="sub">오늘도 수고하는 나에게</div>

</div>

<!-- 앱 -->
<div id="appView" class="hidden">
  <div id="topbar">
    <div class="topbar-in">
      <div class="brand">📔 업무일지</div>
      <div class="tabs">
        <button class="tab on" id="tabToday">오늘</button>
        <button class="tab" id="tabArchive">기록</button>

      <button class="icon-btn" id="exportBtn" title="내보내기">🖨️</button>

  <div id="todayView">

    <div id="sheet">

        </div>

        <div class="section-star">★ 일일 업무 기록
          <div class="actions">
            <button class="mini-btn" id="carryBtn">↩ 미완료 가져오기</button>
          </div>

        <div class="empty-note hidden" id="emptyTasks">아직 기록이 없어요. ＋ 카테고리로 오늘을 시작해 보세요.</div>

        <div class="section-star">★ 기타 업무함 <span style="font-family:Pretendard;font-size:.72rem;font-weight:600;color:var(--ink-soft)">날짜와 무관 · 처리할 때까지 유지</span>
          <div class="actions">

        <div class="inbox-wrap">
          <div class="inbox-hint">분류가 애매한 업무는 일단 여기에. 매일 따라다니다가, 카테고리가 정해지면 "↥ 오늘로" 버튼으로 오늘 일지에 올릴 수 있어요.</div>
          <div id="inboxList"></div>
        </div>

        <div class="section-star">★ 회의 및 기타 메모
          <div class="actions">
            <button class="mini-btn" id="memoImgBtn">🖼 사진</button>
            <button class="mini-btn" id="memoAudioBtn">🎵 녹음파일</button>
            <button class="mini-btn rec-btn" id="memoRecBtn">🎙 녹음</button>
          </div>
        </div>
        <div id="memoBox">
          <textarea id="memoText" placeholder="중요한 회의 내용, 아이디어, 하루의 기록을 남겨 두세요."></textarea>
          <div id="memoFiles" class="file-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <button id="fabCat" title="카테고리 추가">＋</button>

  <div id="archiveView" class="hidden">
    <div class="search-bar"><input id="searchIn" placeholder="🔍 기록 검색 — 언제 무슨 일을 했는지 찾아보세요" autocomplete="off"></div>
    <div class="year-row">
      <button class="date-arrow" id="prevYear">◀</button>
      <div class="year-label" id="yearLabel">2026년</div>
      <button class="date-arrow" id="nextYear">▶</button>
      <button class="mini-btn" id="backupBtn" style="margin-left:8px">💾 백업</button>
    </div>
    <div class="month-grid" id="monthGrid"></div>

  </div>
</div>

<div id="lightbox" class="hidden"><img id="lightboxImg" alt=""></div>
<div id="exportMenu" class="hidden">
  <div class="export-card">
    <h3>A4로 내보내기</h3>
    <button class="btn-primary" id="expPdf">📄 PDF로 저장</button>
    <button class="btn-line" id="expPng">🖼 이미지(PNG)로 저장</button>
    <button class="btn-line" id="expCopy" style="margin-top:10px">📋 텍스트로 복사 (메신저 보고용)</button>
    <button class="btn-line" id="expClose" style="margin-top:10px;border-style:dashed">닫기</button>
  </div>
</div>
<div id="backupModal" class="hidden">
  <div class="bk-card">
    <h3>💾 월별 백업 · 용량 관리</h3>
    <div class="bk-yearrow">
      <button class="date-arrow" id="bkPrevY">◀</button>
      <div class="yl" id="bkYearLabel">2026년</div>
      <button class="date-arrow" id="bkNextY">▶</button>
      <button class="mini-btn" id="bkAll">전체 선택</button>
    </div>
    <div class="bk-months" id="bkMonths"></div>
    <hr class="bk-divider">
    <div class="bk-row">저장 형식 :
      <label><input type="radio" name="bkFmt" value="pdf" checked> PDF</label>
      <label><input type="radio" name="bkFmt" value="png"> 이미지(PNG)</label>
    </div>
    <div class="bk-row"><label><input type="checkbox" id="bkIncAudio" checked> 녹음 원본 파일 포함 <span style="font-weight:400;color:var(--ink-soft)">(PDF에는 소리가 담기지 않아요)</span></label></div>
    <div class="bk-row"><label><input type="checkbox" id="bkIncJson" checked> 데이터(JSON) 포함 <span style="font-weight:400;color:var(--ink-soft)">(나중에 복원 가능)</span></label></div>
    <div class="bk-row warn"><label><input type="checkbox" id="bkDelete"> ⚠ 백업 완료 후 해당 월 데이터 삭제 (용량 확보)</label></div>
    <div id="bkProgWrap" class="hidden">
      <div id="bkProgText"></div>
      <div id="bkBar"><div id="bkBarIn"></div></div>
    </div>
    <div class="bk-btns">
      <button class="btn-primary" id="bkStart">백업 시작</button>
      <button class="btn-line" id="bkCancel">닫기</button>
    </div>
    <hr class="bk-divider">
    <div class="bk-row" style="justify-content:center">
      <button class="mini-btn" id="bkRestore">📂 백업 JSON에서 복원하기</button>
    </div>
  </div>
</div>
<div id="exportStage"></div>
<div id="toast"></div>
<input type="file" id="fileInput" class="hidden">

<script>
/* ═══════════════ ① Firebase 설정 — 본인 프로젝트 값으로 교체 ═══════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyDBw7QrFCfQNXrCxkUHp-iF2qYp34g66ig",
  authDomain: "diary-hyogi.firebaseapp.com",
  databaseURL: "https://diary-hyogi-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "diary-hyogi",
  storageBucket: "diary-hyogi.firebasestorage.app",
  messagingSenderId: "1068928286903",
  appId: "1:1068928286903:web:f095ba58e4dde0ee128d32"
};
/* ═════════════════════════════════════════════════════════════════════════ */
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const $ = id => document.getElementById(id);
const DOW = ['일','월','화','수','목','금','토'];
const STATUS = [
  {k:'wait', label:'대기',   cls:'st-wait'},
  {k:'doing',label:'진행중', cls:'st-doing'},
  {k:'hold', label:'보류',   cls:'st-hold'},
  {k:'done', label:'완료',   cls:'st-done'},
];
const uid8 = () => Math.random().toString(36).slice(2,10);
const esc = s => (s??'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

let USER = null;
let curDate = todayStr();          // 'YYYY-MM-DD'
let day = emptyDay();              // 현재 날짜 데이터
let saveTimer = null, dirty = false;
let arcYear = new Date().getFullYear(), arcMonth = null;
let mediaRecorder = null, recChunks = [];

function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function emptyDay(){ return { note:'', memo:'', memoFiles:[], cats:[] }; }
function dayRef(dateStr){
  const [y,m,d] = dateStr.split('-');
  return db.ref(`diaries/${USER.uid}/${y}/${m}/${d}`);
}
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),2200); }

/* ───────── 인증 ───────── */
$('loginBtn').onclick = doLogin;
$('loginPw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
async function doLogin(){
  const email = $('loginEmail').value.trim(), pw = $('loginPw').value;
  if(!email || !pw){ $('loginMsg').textContent = '이메일과 비밀번호를 입력해 주세요.'; return; }
  $('loginMsg').textContent = '';
  try{
    await auth.signInWithEmailAndPassword(email, pw);
  }catch(e){
    if(e.code==='auth/user-not-found'){
      if(confirm('등록되지 않은 이메일입니다. 이 이메일로 새 다이어리를 만들까요?')){
        try{ await auth.createUserWithEmailAndPassword(email, pw); }
        catch(e2){ $('loginMsg').textContent = authMsg(e2); }
      }
    } else $('loginMsg').textContent = authMsg(e);
  }
}
function authMsg(e){
  const m = {'auth/wrong-password':'비밀번호가 맞지 않습니다.','auth/invalid-credential':'이메일 또는 비밀번호가 맞지 않습니다.',
    'auth/invalid-email':'이메일 형식을 확인해 주세요.','auth/weak-password':'비밀번호는 6자 이상이어야 합니다.',
    'auth/email-already-in-use':'이미 사용 중인 이메일입니다.','auth/network-request-failed':'네트워크 연결을 확인해 주세요.'};
  return m[e.code] || ('오류: ' + e.code);
}
auth.onAuthStateChanged(async u => {
  USER = u;
  if(u){
    $('loginView').classList.add('hidden');
    $('appView').classList.remove('hidden');
    await loadInbox();
    await loadDay(curDate);
  }else{
    $('appView').classList.add('hidden');
    $('loginView').classList.remove('hidden');
  }
});
$('logoutBtn').onclick = async () => { await flushSave(); auth.signOut(); };

/* ───────── 날짜 이동/로드 ───────── */
async function loadDay(dateStr){
  await flushSave();
  curDate = dateStr;
  const snap = await dayRef(dateStr).get();
  day = snap.exists() ? normalize(snap.val()) : emptyDay();
  renderDate(); renderSheet();
}
function normTask(t){
  return { id: t.id||uid8(), text: t.text||'', done: !!t.done,
    status: t.status||'wait', due: t.due||'', note: t.note||'',
    files: Array.isArray(t.files)? t.files : Object.values(t.files||{}), open: false };
}
function normalize(v){
  return {
    note: v.note||'', memo: v.memo||'',
    memoFiles: Array.isArray(v.memoFiles)? v.memoFiles : Object.values(v.memoFiles||{}),
    cats: (Array.isArray(v.cats)? v.cats : Object.values(v.cats||{})).map(c => ({
      id: c.id||uid8(), name: c.name||'', color: c.color||0,
      tasks: (Array.isArray(c.tasks)? c.tasks : Object.values(c.tasks||{})).map(normTask)
    }))
  };
}
function shiftDay(n){
  const d = new Date(curDate + 'T12:00:00');
  d.setDate(d.getDate()+n);
  loadDay(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
}
$('prevDay').onclick = () => shiftDay(-1);
$('nextDay').onclick = () => shiftDay(1);
$('goToday').onclick = () => loadDay(todayStr());
$('datePick').addEventListener('change', e => { if(e.target.value) loadDay(e.target.value); });
function renderDate(){
  const d = new Date(curDate+'T12:00:00');
  $('dowText').textContent = `${DOW[d.getDay()]}요일`;
  $('ymdText').textContent = `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}.`;
  $('datePick').value = curDate;
}

/* ───────── 저장 (자동, 800ms 디바운스) ───────── */
function markDirty(){
  dirty = true; $('saveState').textContent = '입력 중…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNow, 800);
}
async function saveNow(){
  if(!dirty || !USER) return;
  dirty = false;
  const clean = JSON.parse(JSON.stringify(day, (k,v)=> k==='open'? undefined : v));
  const isEmpty = !clean.note && !clean.memo && !clean.memoFiles.length && !clean.cats.length;
  try{
    if(isEmpty) await dayRef(curDate).remove();
    else await dayRef(curDate).set(clean);
    delete yearCache[+curDate.slice(0,4)];
    $('saveState').textContent = '✓ 저장됨 ' + new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    dirty = true; $('saveState').textContent = '⚠ 저장 실패 — 네트워크 확인';
  }
}
async function flushSave(){ clearTimeout(saveTimer); await saveNow(); clearTimeout(inboxTimer); await saveInbox(); }
window.addEventListener('beforeunload', () => { if(dirty){ saveNow(); } });

/* ───────── 시트 렌더 ───────── */
function renderSheet(){
  $('dayNote').value = day.note;
  $('memoText').value = day.memo;
  renderCats(); renderInbox(); renderMemoFiles();
}
$('dayNote').addEventListener('input', e => { day.note = e.target.value; markDirty(); });
$('memoText').addEventListener('input', e => { day.memo = e.target.value; markDirty(); autoGrow(e.target); });
function autoGrow(el){ el.style.height='auto'; el.style.height = Math.max(128, el.scrollHeight)+'px'; }

const PALETTE = ['#3A57C8','#C8503C','#2E8B57','#7B4AC8','#C87A2E','#1F8FA8','#C8567F'];
const catColor = cat => PALETTE[(cat.color||0)%PALETTE.length];

function renderCats(){
  const box = $('catList'); box.innerHTML = '';
  $('emptyTasks').classList.toggle('hidden', day.cats.length>0);
  day.cats.forEach((cat, ci) => {
    const col = catColor(cat);
    const el = document.createElement('div'); el.className='cat';
    el.innerHTML = `
      <div class="cat-head" style="border-bottom-color:${col}55">
        <button class="cat-dot" title="카테고리 색 바꾸기" style="background:${col}"></button>
        <input class="cat-name" style="color:${col}" value="${esc(cat.name)}" placeholder="카테고리 (예: 핵심인재 교육)">
        <div class="ctl">
          <button title="위로">▲</button><button title="아래로">▼</button>
          <button title="업무 추가">＋</button><button class="del" title="삭제">✕</button>
        </div>
      </div>
      <div class="task-list"></div>`;
    el.querySelector('.cat-dot').onclick = () => { cat.color = ((cat.color||0)+1)%PALETTE.length; markDirty(); renderCats(); };
    const [up,down,add,del] = el.querySelectorAll('.ctl button');
    el.querySelector('.cat-name').addEventListener('input', e => { cat.name = e.target.value; markDirty(); });
    up.onclick   = () => moveArr(day.cats, ci, -1, markDirty, renderCats);
    down.onclick = () => moveArr(day.cats, ci, 1, markDirty, renderCats);
    add.onclick  = () => { cat.tasks.push(newTask()); markDirty(); renderCats(); focusLastTask(el); };
    del.onclick  = () => { if(!cat.tasks.length || confirm(`'${cat.name||'카테고리'}'와 하위 업무를 모두 삭제할까요?`)){ day.cats.splice(ci,1); markDirty(); renderCats(); } };
    const list = el.querySelector('.task-list');
    cat.tasks.forEach((t,ti)=> list.appendChild(taskRow(t, {arr:cat.tasks, idx:ti, save:markDirty, rerender:renderCats, cat})));
    box.appendChild(el);
  });
}
function newTask(){ return {id:uid8(), text:'', done:false, status:'wait', due:'', note:'', files:[], open:false}; }
function moveArr(arr,i,dir,save,rerender){ const j=i+dir; if(j<0||j>=arr.length) return; [arr[i],arr[j]]=[arr[j],arr[i]]; save(); rerender(); }
function focusLastTask(catEl){ const ins = catEl.querySelectorAll('.task-text'); if(ins.length) ins[ins.length-1].focus(); }

/* ── 공용 업무 행: ctx = {arr, idx, save, rerender, cat|null, inbox?} ── */
function taskRow(t, ctx){
  const st = STATUS.find(s=>s.k===t.status) || STATUS[0];
  const col = ctx.cat ? catColor(ctx.cat) : '#B08A5A';
  const overdue = t.due && !t.done && t.due < todayStr();
  const dueLabel = t.due ? `${+t.due.slice(5,7)}/${+t.due.slice(8,10)}` : '📅';
  const row = document.createElement('div');
  row.className = 'task' + (t.done? ' done':'');
  row.style.borderLeft = `3px solid ${col}40`;
  row.style.paddingLeft = '7px';
  row.innerHTML = `
    <button class="chk" style="border-color:${col};${t.done? `background:${col}`:''}" title="완료 체크">${t.done?'✔':''}</button>
    <input class="task-text" value="${esc(t.text)}" placeholder="－ 할 일을 적어 주세요">
    <div class="task-meta">
      <button class="status-chip ${st.cls}" title="상태 바꾸기">${st.label}</button>
      <span class="due-wrap">
        <button class="due-chip ${overdue?'over':''}" title="${t.due||'마감일 지정'}">${dueLabel}</button>
        <input type="date" value="${t.due}" title="마감일">
      </span>
      <button class="note-btn" title="퀵메모">📝${t.note.trim()? '<span class="dot"></span>':''}</button>
      <button class="clip-btn" title="첨부">📎${t.files.length? `<span class="cnt">${t.files.length}</span>`:''}</button>
      <div class="ctl">
        ${ctx.inbox? '<button class="to-today" title="오늘 일지로 보내기">↥</button>':''}
        <button title="위로">▲</button><button title="아래로">▼</button><button class="del" title="삭제">✕</button>
      </div>
    </div>`;
  row.querySelector('.chk').onclick = () => { t.done=!t.done; t.status = t.done?'done':(t.status==='done'?'doing':t.status); ctx.save(); ctx.rerender(); };
  row.querySelector('.task-text').addEventListener('input', e => { t.text=e.target.value; ctx.save(); });
  row.querySelector('.status-chip').onclick = () => {
    const i = STATUS.findIndex(s=>s.k===t.status);
    t.status = STATUS[(i+1)%STATUS.length].k;
    t.done = t.status==='done';
    ctx.save(); ctx.rerender();
  };
  row.querySelector('.due-wrap input').addEventListener('change', e => { t.due=e.target.value; ctx.save(); ctx.rerender(); });
  row.querySelector('.note-btn').onclick = () => { t.open=!t.open; ctx.rerender(); };
  row.querySelector('.clip-btn').onclick = () => { t.open=!t.open; ctx.rerender(); };
  const ctl = row.querySelectorAll('.ctl button');
  let bi = 0;
  if(ctx.inbox){ ctl[bi++].onclick = () => sendInboxToToday(t, ctx.idx); }
  ctl[bi++].onclick = () => moveArr(ctx.arr, ctx.idx, -1, ctx.save, ctx.rerender);
  ctl[bi++].onclick = () => moveArr(ctx.arr, ctx.idx, 1, ctx.save, ctx.rerender);
  ctl[bi].onclick   = () => { if(!t.text || confirm('이 업무를 삭제할까요?')){ ctx.arr.splice(ctx.idx,1); ctx.save(); ctx.rerender(); } };

  if(t.open){
    const panel = document.createElement('div');
    panel.className = 'attach-panel';
    panel.innerHTML = `

$('carryBtn').onclick = async () => {
  await flushSave();
  const found = await findPrevRecord(curDate);
  if(!found){ toast('이전 기록이 없어요'); return; }
  let moved = 0;
  found.data.cats.forEach(pc => {
    const undone = pc.tasks.filter(t => !t.done && t.text.trim());
    if(!undone.length) return;
    let target = day.cats.find(c => c.name.trim() && c.name.trim()===pc.name.trim());
    if(!target){ target = {id:uid8(), name:pc.name, color:pc.color||0, tasks:[]}; day.cats.push(target); }

      if(target.tasks.some(x => x.text.trim()===t.text.trim())) return;
      target.tasks.push({...normTask(t), id:uid8()});
      moved++;
    });
  });
  if(moved){ markDirty(); renderCats(); toast(`마지막 기록(${found.label})의 미완료 업무 ${moved}건을 가져왔어요`); }
  else toast(`마지막 기록(${found.label})에 남은 미완료 업무가 없어요`);
};
async function findPrevRecord(dateStr){
  const y0 = +dateStr.slice(0,4);
  for(let k=0; k<10; k++){                 // 최대 10년 전까지 역탐색
    const y = y0 - k; if(y < 2000) break;
    const yd = await getYear(y);
    let best = null;
    for(const mm in yd) for(const dd in yd[mm]){
      const ds = `${y}-${mm}-${dd}`;
      if(ds < dateStr && (!best || ds > best)) best = ds;
    }
    if(best){ const [Y,M,D] = best.split('-'); return {label:`${+M}/${+D}`, data: normalize(yd[M][D])}; }
  }
  return null;
}

function addImage(file, arr, done){
  done = done || (()=>{ markDirty(); renderAll(); });
  const img = new Image(); const url = URL.createObjectURL(file);
  img.onload = () => {
    const MAX = 1280, sc = Math.min(1, MAX/Math.max(img.width, img.height));
    const cv = document.createElement('canvas');
    cv.width = Math.round(img.width*sc); cv.height = Math.round(img.height*sc);
    cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
    arr.push({ id:uid8(), type:'image', name:file.name, data: cv.toDataURL('image/jpeg', .82), ts: Date.now() });
    URL.revokeObjectURL(url); done(); toast('사진을 저장했어요');
  };
  img.onerror = () => toast('이미지를 읽지 못했어요');
  img.src = url;
}
function addAudio(file, arr, done){
  done = done || (()=>{ markDirty(); renderAll(); });
  if(file.size > 8*1024*1024){ toast('녹음파일은 8MB 이하만 저장할 수 있어요'); return; }
  const r = new FileReader();
  r.onload = () => { arr.push({ id:uid8(), type:'audio', name:file.name, data:r.result, ts:Date.now() }); done(); toast('녹음파일을 저장했어요'); };
  r.readAsDataURL(file);
}

$('memoRecBtn').onclick = async () => {
  const btn = $('memoRecBtn');
  if(mediaRecorder && mediaRecorder.state==='recording'){ mediaRecorder.stop(); return; }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const mime = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
               : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
    mediaRecorder = new MediaRecorder(stream, mime? {mimeType:mime}:{});
    recChunks = [];
    mediaRecorder.ondataavailable = e => { if(e.data.size) recChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t=>t.stop());
      btn.classList.remove('recording'); btn.textContent = '🎙 녹음';
      const blob = new Blob(recChunks, {type: mediaRecorder.mimeType||'audio/mp4'});
      if(blob.size > 8*1024*1024){ toast('녹음이 너무 길어 저장하지 못했어요(8MB 초과)'); return; }
      const ext = (mediaRecorder.mimeType||'').includes('mp4') ? 'm4a' : 'webm';
      const r = new FileReader();
      r.onload = () => {
        day.memoFiles.push({id:uid8(), type:'audio', name:`녹음_${curDate}_${new Date().toTimeString().slice(0,5).replace(':','')}.${ext}`, data:r.result, ts:Date.now()});
        markDirty(); renderMemoFiles(); toast('녹음을 메모에 저장했어요');
      };
      r.readAsDataURL(blob);
    };
    mediaRecorder.start();
    btn.classList.add('recording'); btn.textContent = '⏹ 녹음 중… 누르면 종료';
  }catch(e){ toast('마이크 권한을 허용해 주세요'); }
};

  const imgs = data.memoFiles.filter(f=>f.type==='image').map(f=>`<img src="${f.data}">`).join('');
  const audioNote = data.memoFiles.some(f=>f.type==='audio') ? '<div style="font-size:13px;color:#8A705A;margin-top:8px">🎵 녹음 첨부 있음(백업 ZIP의 첨부 폴더 참고)</div>' : '';

    <div class="a4-foot">${dateStr} · 정인혁의 업무일지</div>`;
  return el;
}
function canvasToPdfBlob(canvas){
  const pdf = new jspdf.jsPDF({unit:'mm', format:'a4'});
  const pw = 210, ph = 297;
  const pagePx = Math.floor(canvas.width * ph / pw);
  let y = 0, page = 0;
  while(y < canvas.height){
    const slice = document.createElement('canvas');
    slice.width = canvas.width;
    slice.height = Math.min(pagePx, canvas.height - y);
    slice.getContext('2d').drawImage(canvas, 0, y, canvas.width, slice.height, 0, 0, canvas.width, slice.height);
    if(page>0) pdf.addPage();
    pdf.addImage(slice.toDataURL('image/jpeg', .93), 'JPEG', 0, 0, pw, slice.height * pw / canvas.width);
    y += pagePx; page++;
  }
  return pdf.output('blob');
}

function safeName(s){ return (s||'file').replace(/[\\/:*?"<>|#%&{}]/g,'_').slice(0,60); }
function dataUrlParts(u){
  const i = u.indexOf(',');
  return { b64: u.slice(i+1), mime: (u.slice(5, u.indexOf(';'))||'') };
}
function audioExt(f){
  if(/\.[a-z0-9]{2,4}$/i.test(f.name)) return '';                     // 이름에 이미 확장자
  const m = dataUrlParts(f.data).mime;
  return m.includes('mp4')? '.m4a' : m.includes('webm')? '.webm' : m.includes('mpeg')? '.mp3' : '.audio';
}

    const yd = await getYear(bkYear);
    const total = months.reduce((s,mm)=> s + (yd[mm]? Object.keys(yd[mm]).length : 0), 0);
    if(!total) throw new Error('선택한 월에 기록이 없습니다');
    const zip = new JSZip();
    let done = 0;

    for(const mm of months){
      if(bkAbort) throw new Error('abort');
      const daysObj = yd[mm] || {};
      const folder = zip.folder(`${bkYear}-${mm}`);
      if(incJson) folder.file(`data_${bkYear}-${mm}.json`,
        JSON.stringify({app:'inhyeok-diary', ver:1, year:bkYear, month:mm, days:daysObj}));

      for(const dd of Object.keys(daysObj).sort()){
        if(bkAbort) throw new Error('abort');
        const dateStr = `${bkYear}-${mm}-${dd}`;
        bkProgress(done/total*90, `${dateStr} 변환 중… (${done+1}/${total}일)`);
        const data = normalize(daysObj[dd]);
        const canvas = await renderDayCanvas(dateStr, data);
        if(fmt==='png') folder.file(`업무일지_${dateStr}.png`, canvas.toDataURL('image/png').split(',')[1], {base64:true});
        else            folder.file(`업무일지_${dateStr}.pdf`, canvasToPdfBlob(canvas));

        if(incAudio){
          const files = [
            ...data.memoFiles.map(f => ({...f, from:'메모'})),
            ...data.cats.flatMap(c => c.tasks.flatMap(t => t.files.map(f => ({...f, from:safeName(t.text)||'업무'}))))
          ].filter(f => f.type==='audio');
          files.forEach((f,i) => {
            folder.file(`첨부/${dd}일_${f.from}_${i+1}_${safeName(f.name)}${audioExt(f)}`, dataUrlParts(f.data).b64, {base64:true});
          });
        }
        done++;
        await new Promise(r => setTimeout(r, 20));   // 화면 갱신 양보
      }
    }
    bkProgress(92, 'ZIP으로 압축하는 중…');
    const blob = await zip.generateAsync(
      {type:'blob', compression:'DEFLATE', compressionOptions:{level:6}},
      meta => bkProgress(92 + meta.percent*0.08, `ZIP으로 압축하는 중… ${Math.round(meta.percent)}%`)
    );
    const label = months.length===12? '전체' : months.map(m=>+m+'월').join('·');
    downloadBlob(blob, `업무일지_백업_${bkYear}년_${label}.zip`);
    bkProgress(100, `✓ 백업 완료 — ${total}일 · ${(blob.size/1024/1024).toFixed(1)}MB`);

    if(delAfter){
      if(confirm(`ZIP 다운로드가 시작됐습니다.\n파일이 단말기에 정상 저장된 것을 확인하셨나요?\n[확인]을 누르면 ${bkYear}년 ${months.map(m=>+m+'월').join(', ')} 데이터를 서버에서 삭제합니다.`)){
        for(const mm of months) await db.ref(`diaries/${USER.uid}/${bkYear}/${mm}`).remove();
        delete yearCache[bkYear];
        if(+curDate.slice(0,4)===bkYear && months.includes(curDate.slice(5,7))){ day = emptyDay(); renderSheet(); }
        toast('선택한 월 데이터를 삭제해 용량을 확보했어요');
        renderBkMonths(); renderArchive();
      } else toast('삭제를 취소했어요. 데이터는 그대로 있습니다');
    } else toast('백업 ZIP을 저장했어요');
  }catch(e){
    if(e.message==='abort'){ bkProgress(0,''); $('bkProgWrap').classList.add('hidden'); toast('백업을 중단했어요. 데이터는 변경되지 않았습니다'); }
    else { bkProgress(0,''); toast('백업 실패: '+e.message); }
    $('exportStage').innerHTML = '';
  }finally{
    bkRunning = false; bkAbort = false;
    $('bkStart').disabled = false; $('bkCancel').textContent = '닫기';
  }
};

/* ── 백업 JSON에서 복원 ── */
$('bkRestore').onclick = () => {
  if(bkRunning) return;
  pickFile('.json,application/json', async file => {
    try{
      const obj = JSON.parse(await file.text());
      if(obj.app!=='inhyeok-diary' || !obj.days) throw new Error('이 앱의 백업 JSON이 아닙니다');
      const {year, month, days} = obj;
      const dds = Object.keys(days);
      const exist = await db.ref(`diaries/${USER.uid}/${year}/${month}`).get();
      const dup = exist.exists()? dds.filter(d => exist.val()[d]) : [];
      if(dup.length && !confirm(`${year}년 ${+month}월에 이미 ${dup.length}일의 기록이 있습니다.\n백업 내용으로 덮어쓸까요? (겹치지 않는 날은 그대로 추가됩니다)`)) return;
      const updates = {};
      dds.forEach(d => updates[d] = days[d]);
      await db.ref(`diaries/${USER.uid}/${year}/${month}`).update(updates);
      delete yearCache[year]; delete yearCache[String(year)];
      toast(`${year}년 ${+month}월 ${dds.length}일 기록을 복원했어요`);
      bkYear = +year; renderBkMonths();
      if(!$('archiveView').classList.contains('hidden')){ arcYear=+year; arcMonth=month; renderArchive(); }
      if(curDate.startsWith(`${year}-${month}`)) loadDay(curDate);
    }catch(e){ toast('복원 실패: '+e.message); }
  });
};

/* ═══════════════ 기타 업무함 (날짜와 무관, 처리 시까지 유지) ═══════════════ */
let inbox = [], inboxTimer = null, inboxDirty = false;
async function loadInbox(){
  const snap = await db.ref(`diaries/${USER.uid}/inbox`).get();
  const v = snap.exists()? snap.val() : [];
  inbox = (Array.isArray(v)? v : Object.values(v)).map(normTask);
}
function markInbox(){
  inboxDirty = true;
  clearTimeout(inboxTimer);
  inboxTimer = setTimeout(saveInbox, 800);
}
async function saveInbox(){
  if(!inboxDirty || !USER) return;
  inboxDirty = false;
  const clean = JSON.parse(JSON.stringify(inbox, (k,v)=> k==='open'? undefined : v));
  try{
    if(clean.length) await db.ref(`diaries/${USER.uid}/inbox`).set(clean);
    else await db.ref(`diaries/${USER.uid}/inbox`).remove();
  }catch(e){ inboxDirty = true; }
}
function renderInbox(){
  const box = $('inboxList'); box.innerHTML = '';
  inbox.forEach((t,ti) => box.appendChild(taskRow(t, {arr:inbox, idx:ti, save:markInbox, rerender:renderInbox, cat:null, inbox:true})));
}
$('inboxAddBtn').onclick = () => {
  inbox.push(newTask()); markInbox(); renderInbox();
  const ins = $('inboxList').querySelectorAll('.task-text');
  if(ins.length) ins[ins.length-1].focus();
};
$('inboxClearBtn').onclick = () => {
  const done = inbox.filter(t=>t.done).length;
  if(!done){ toast('완료된 업무가 없어요'); return; }
  if(confirm(`완료된 업무 ${done}건을 기타 업무함에서 지울까요?`)){
    inbox = inbox.filter(t=>!t.done); markInbox(); renderInbox(); toast('완료 업무를 정리했어요');
  }
};
function sendInboxToToday(t, idx){
  let target = null;
  const named = day.cats.filter(c=>c.name.trim());
  if(named.length){
    const menu = named.map((c,i)=>`${i+1}. ${c.name.trim()}`).join('\n');
    const ans = prompt(`어느 카테고리로 보낼까요? 번호를 입력하세요.\n${menu}\n0. 새 '기타 업무' 카테고리`, '0');
    if(ans===null) return;
    const n = parseInt(ans,10);
    if(n>=1 && n<=named.length) target = named[n-1];
  }
  if(!target){
    target = day.cats.find(c=>c.name.trim()==='기타 업무');
    if(!target){ target = {id:uid8(), name:'기타 업무', color:4, tasks:[]}; day.cats.push(target); }
  }
  target.tasks.push({...normTask(t), id:uid8()});
  inbox.splice(idx,1);
  markDirty(); markInbox(); renderAll();
  toast(`'${target.name.trim()||'기타 업무'}'(으)로 옮겼어요`);
}

/* ═══════════════ 기록 검색 ═══════════════ */
let searchQ = '', searchTimer = null;
$('searchIn').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{ searchQ = e.target.value.trim(); refreshArchive(); }, 300);
});
function refreshArchive(){ searchQ ? doSearch(searchQ) : renderArchive(); }
function hl(text, q){
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return esc(text);
  return esc(text.slice(0,i)) + '<mark>' + esc(text.slice(i,i+q.length)) + '</mark>' + esc(text.slice(i+q.length));
}
function snippet(text, q){
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  const st = Math.max(0, i-15);
  return (st>0?'…':'') + text.slice(st, i + q.length + 30).replace(/\n/g,' ');
}
async function doSearch(q){
  await flushSave();
  $('yearLabel').textContent = arcYear + '년';
  $('monthGrid').classList.add('hidden');
  const yd = await getYear(arcYear);
  const ql = q.toLowerCase();
  const list = $('dayList'); list.innerHTML = '';
  const out = [];
  for(const mm of Object.keys(yd).sort().reverse()){
    for(const dd of Object.keys(yd[mm]).sort().reverse()){
      const v = normalize(yd[mm][dd]);
      const lines = [];
      if(v.note.toLowerCase().includes(ql)) lines.push({k:'남김말', h:hl(v.note,q)});
      v.cats.forEach(c => {
        const cn = c.name.trim()||'(무제)', col = catColor(c);
        if(cn.toLowerCase().includes(ql))
          lines.push({k:'카테고리', h:`<span class="sr-cat" style="color:${col}">${hl(cn,q)}</span>`});
        c.tasks.forEach(t => {
          if(t.text.toLowerCase().includes(ql))
            lines.push({k:'업무', h:`<span class="sr-cat" style="color:${col}">${esc(cn)} ›</span> ${hl(t.text,q)}${t.done?' ✔':''}`});
          else if(t.note.toLowerCase().includes(ql))
            lines.push({k:'퀵메모', h:`<span class="sr-cat" style="color:${col}">${esc(cn)} › ${esc(t.text)}</span> — ${hl(snippet(t.note,q),q)}`});
        });
      });
      if(v.memo.toLowerCase().includes(ql)) lines.push({k:'메모', h:hl(snippet(v.memo,q),q)});
      if(lines.length) out.push({mm, dd, lines});
    }
  }
  if(!out.length){
    list.innerHTML = `<div class="empty-note">'${esc(q)}'에 대한 ${arcYear}년 기록이 없어요.<br>◀ ▶ 로 연도를 바꿔 검색해 보세요.</div>`;
    return;
  }
  const head = document.createElement('div');
  head.className = 'empty-note'; head.style.padding = '4px 0 12px';
  head.textContent = `'${q}' — ${arcYear}년에서 ${out.length}일의 기록을 찾았어요`;
  list.appendChild(head);
  out.forEach(r => {
    const dt = new Date(`${arcYear}-${r.mm}-${r.dd}T12:00:00`);
    const card = document.createElement('div'); card.className = 'day-card';
    const shown = r.lines.slice(0,5).map(l => `<div class="sr-line"><span class="sr-kind">${l.k}</span>${l.h}</div>`).join('');
    const more = r.lines.length>5 ? `<div class="sr-line" style="color:var(--ink-soft)">＋ ${r.lines.length-5}건 더</div>` : '';
    card.innerHTML = `
      <div class="dc-date"><div class="d">${+r.dd}</div><div class="w">${+r.mm}월 ${DOW[dt.getDay()]}</div></div>
      <div class="dc-body">${shown}${more}</div>`;
    card.onclick = () => { switchTab(true); loadDay(`${arcYear}-${r.mm}-${r.dd}`); };
    list.appendChild(card);
  });
}

/* ═══════════════ 보고용 텍스트 복사 ═══════════════ */
function buildReport(){
  const d = new Date(curDate+'T12:00:00');
  const stMap = Object.fromEntries(STATUS.map(s=>[s.k,s.label]));
  let out = `[업무일지] ${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}.(${DOW[d.getDay()]})`;
  if(day.note.trim()) out += `\n남김말: ${day.note.trim()}`;
  day.cats.forEach(c => {
    const ts = c.tasks.filter(t=>t.text.trim());
    if(!ts.length && !c.name.trim()) return;
    out += `\n\n■ ${c.name.trim()||'(무제)'}`;
    ts.forEach(t => {
      out += `\n - [${stMap[t.status]}] ${t.text.trim()}${t.due? ` (~${+t.due.slice(5,7)}/${+t.due.slice(8,10)})`:''}`;
      if(t.note.trim()) out += `\n    · ${t.note.trim().replace(/\n/g,'\n    · ')}`;
    });
  });
  if(day.memo.trim()) out += `\n\n※ 메모\n${day.memo.trim()}`;
  return out;
}
$('expCopy').onclick = async () => {
  $('exportMenu').classList.add('hidden');
  await flushSave();
  const txt = buildReport();
  try{ await navigator.clipboard.writeText(txt); }
  catch(e){
    const ta = document.createElement('textarea'); ta.value = txt;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
  }
  toast('보고용 텍스트를 복사했어요 — 메신저·메일에 붙여넣으세요');
};
